<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Java Full Stack Landing Page</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Java Full Stack Internship</h1>

<p>Build Modern Web Applications using HTML, CSS & Spring Boot</p>

</header>

<section class="about">

<h2>About</h2>

<p>

Learn HTML, CSS, JavaScript, Java,

Spring Boot and MySQL through

hands-on projects.

</p>

</section>

<section class="contact">

<h2>Contact Us</h2>

<form id="contactForm">

<input
type="text"
id="name"
placeholder="Enter Name"
required>

<input
type="email"
id="email"
placeholder="Enter Email"
required>

<textarea
id="message"
placeholder="Enter Message"
required></textarea>

<button type="submit">

Submit

</button>

</form>

<p id="result"></p>

</section>

<script>

document.getElementById("contactForm")

.addEventListener("submit", function(e){

e.preventDefault();

const data={

name:document.getElementById("name").value,

email:document.getElementById("email").value,

message:document.getElementById("message").value

};

fetch("http://localhost:8080/contact",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(data)

})

.then(response=>response.text())

.then(result=>{

document.getElementById("result").innerHTML=result;

document.getElementById("contactForm").reset();

});

});

</script>

</body>

</html>
